name: granja_avicola
description: "Sistema de gestión de granja avícola - Producción de huevos"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase - versiones compatibles con Dart 3.5
  firebase_core: ^2.31.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  
  # Utils
  intl: ^0.20.2
  fl_chart: ^0.66.0
  pdf: ^3.10.0
  excel: ^4.0.3
  share_plus: ^9.0.0
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true